# Coolify-konfiguration för Moveum platform
# PocketBase: selvhostad backend med migrations + hooks
# Web: Next.js-app (alternativt kan deployas direkt från GitHub)

version: "3.8"

services:
  pocketbase:
    image: pocketbase/pocketbase:latest
    container_name: moveum-pocketbase
    command: pocketbase serve --http=0.0.0.0:8080
    restart: always
    ports:
      - "8080:8080"
    volumes:
      # Data
      - pb_data:/pb_data
      # Migrations (JS)
      - ./backend/pocketbase-schema/migrations:/pb_migrations
      # Hooks (JS)
      - ./backend/pocketbase-schema/hooks:/pb_hooks
    environment:
      POCKETBASE_ENCRYPTION_KEY: ${POCKETBASE_ENCRYPTION_KEY:-}
      APP_ADMIN_INITIAL_PASSWORD: ${APP_ADMIN_INITIAL_PASSWORD:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: moveum-web
    restart: always
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_POCKETBASE_URL: http://pocketbase:8080
      NODE_ENV: production
    depends_on:
      pocketbase:
        condition: service_healthy

volumes:
  pb_data:
    driver: local

