# Coolify används endast för PocketBase-schema/hook-synk.
# Frontend deployas separat till Vercel från `apps/web`.
version: "1.0"
services:
  pocketbase:
    name: platform-pocketbase
    image: pocketbase/pocketbase:latest
    command: pocketbase serve --http 8080
    ports:
      - 8080:8080
    volumes:
      - ./backend/pocketbase-data:/pb_data
      - ./backend/pocketbase-schema:/pb_schema
