# PocketBase använder SQLite för lagring på UpCloud.
# Databasfilen hålls i ./backend/pocketbase-data i denna struktur.
version: "1.0"
services:
  frontend:
    name: platform-frontend
    image: node:20
    build:
      context: .
      dockerfile: Dockerfile
    command: npm install && npm run build && npm run start
    ports:
      - 3000:3000
    env:
      - NEXT_PUBLIC_POCKETBASE_URL

  pocketbase:
    name: platform-pocketbase
    image: pocketbase/pocketbase:latest
    command: pocketbase serve --http 8080
    ports:
      - 8080:8080
    volumes:
      - ./backend/pocketbase-data:/pb_data
      - ./backend/pocketbase-schema:/pb_schema
