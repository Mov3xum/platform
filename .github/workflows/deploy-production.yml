name: Deploy to Coolify Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install

      - name: Build web app
        run: yarn build --workspace=@platform/web

      - name: Deploy to Coolify production
        env:
          COOLIFY_BASE_URL: ${{ secrets.COOLIFY_BASE_URL }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          COOLIFY_APP_UUID: ${{ secrets.COOLIFY_PROJECT_ID_PRODUCTION }}
        run: |
          response=$(curl --fail-with-body -sS -X POST \
            -H "Authorization: Bearer $COOLIFY_TOKEN" \
            -H "Accept: application/json" \
            "$COOLIFY_BASE_URL/api/v1/applications/$COOLIFY_APP_UUID/start?force=false")

          echo "$response"

          deployment_uuid=$(node -e "const data = JSON.parse(process.argv[1]); if (!data.deployment_uuid) process.exit(1); process.stdout.write(data.deployment_uuid);" "$response")
          echo "Queued Coolify deployment: $deployment_uuid"
