name: Deploy to Coolify Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Typecheck
        run: yarn typecheck

      - name: Build web app
        run: yarn build

      - name: Deploy to Coolify production
        env:
          COOLIFY_BASE_URL: ${{ secrets.COOLIFY_BASE_URL }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          COOLIFY_APP_UUID: ${{ secrets.COOLIFY_APP_UUID_PRODUCTION || secrets.COOLIFY_PROJECT_ID_PRODUCTION }}
          COOLIFY_DEPLOY_WEBHOOK: ${{ secrets.COOLIFY_DEPLOY_WEBHOOK_PRODUCTION }}
        run: |
          set -euo pipefail

          if [ -n "${COOLIFY_DEPLOY_WEBHOOK:-}" ]; then
            echo "Using Coolify deploy webhook"
            curl --fail-with-body -sS -X POST \
              -H "Authorization: Bearer $COOLIFY_TOKEN" \
              -H "Accept: application/json" \
              "$COOLIFY_DEPLOY_WEBHOOK"
            exit 0
          fi

          if [ -z "${COOLIFY_APP_UUID:-}" ]; then
            echo "Missing Coolify app UUID. Set COOLIFY_APP_UUID_PRODUCTION (or legacy COOLIFY_PROJECT_ID_PRODUCTION) in GitHub Secrets."
            exit 1
          fi

          encoded_identifier=$(node -e "process.stdout.write(encodeURIComponent(process.argv[1]))" "$COOLIFY_APP_UUID")
          deploy_param="uuid"
          if [[ "$COOLIFY_APP_UUID" == *:* ]]; then
            deploy_param="tag"
          fi

          deploy_v4="$COOLIFY_BASE_URL/api/v1/deploy?$deploy_param=$encoded_identifier&force=false"
          deploy_v1="$COOLIFY_BASE_URL/api/v1/applications/$COOLIFY_APP_UUID/start?force=false"

          try_deploy() {
            local endpoint="$1"
            echo "Trying Coolify endpoint: $endpoint"

            local http_code
            http_code=$(curl -sS -X POST \
              -H "Authorization: Bearer $COOLIFY_TOKEN" \
              -H "Accept: application/json" \
              -o /tmp/coolify-response.json \
              -w "%{http_code}" \
              "$endpoint")

            if [ "$http_code" = "404" ]; then
              return 2
            fi

            if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
              cat /tmp/coolify-response.json
              return 0
            fi

            echo "Coolify deploy failed with HTTP $http_code"
            cat /tmp/coolify-response.json
            return 1
          }

          if try_deploy "$deploy_v4"; then
            exit 0
          elif [ $? -eq 2 ]; then
            echo "Endpoint not found, trying legacy path..."
          else
            exit 1
          fi

          if try_deploy "$deploy_v1"; then
            exit 0
          fi

          echo "Both Coolify deploy endpoints returned 404. Verify COOLIFY_BASE_URL and that COOLIFY_APP_UUID_PRODUCTION contains the Coolify app UUID."
          exit 1

      - name: Bootstrap PocketBase schema for production
        env:
          PB_URL: ${{ secrets.PB_URL_PRODUCTION }}
          PB_SU_EMAIL: ${{ secrets.PB_SU_EMAIL_PRODUCTION || 'hampus@movexum.se' }}
          PB_SU_PASSWORD: ${{ secrets.PB_SU_PASSWORD_PRODUCTION }}
          APP_USER_PASSWORD: ${{ secrets.APP_USER_PASSWORD_PRODUCTION }}
          NODE_TLS_REJECT_UNAUTHORIZED: '0'
        run: |
          set -euo pipefail

          if [ -z "${PB_URL:-}" ] || [ -z "${PB_SU_PASSWORD:-}" ]; then
            echo "::warning::Saknar PocketBase-produktionssecrets (PB_URL_PRODUCTION / PB_SU_PASSWORD_PRODUCTION). Hoppar över PB-bootstrap i denna deploy."
            echo "PB_READY=false" >> "$GITHUB_ENV"
            exit 0
          fi

          # Produktions-PB serveras via Coolify-proxyn och kan svara på antingen
          # http eller https (sslip.io). Prova båda och välj den som lever — så
          # uppdateras schemat korrekt oavsett TLS-läge (jfr sync/recover-jobben).
          strip_url() {
            local raw="${1%/}"
            raw="${raw#http://}"
            raw="${raw#https://}"
            printf '%s' "$raw"
          }
          host=$(strip_url "$PB_URL")
          candidates=("http://$host" "https://$host")

          pb_ready=false
          selected_url=""
          max_attempts=8
          sleep_seconds=8
          consecutive_503=0
          consecutive_503_limit=2

          echo "Väntar på PocketBase auth-readiness ($host)"
          for attempt in $(seq 1 "$max_attempts"); do
            matched_503=0
            for cand in "${candidates[@]}"; do
              health_code=$(curl -k -sS --connect-timeout 5 --max-time 10 -o /dev/null -w "%{http_code}" "$cand/api/health" || true)
              auth_code=$(curl -k -sS --connect-timeout 5 --max-time 10 -o /dev/null -w "%{http_code}" \
                -H "Content-Type: application/json" \
                -X POST \
                "$cand/api/collections/_superusers/auth-with-password" \
                --data '{"identity":"readiness-probe","password":"readiness-probe"}' || true)

              if [[ "$health_code" == "200" && "$auth_code" != "503" && "$auth_code" != "502" && "$auth_code" != "000" ]]; then
                echo "PocketBase ready at $cand (health=$health_code, auth=$auth_code)"
                pb_ready=true
                selected_url="$cand"
                break
              fi

              if [[ "$health_code" == "503" && "$auth_code" == "503" ]]; then
                matched_503=$((matched_503 + 1))
              fi
              echo "PB inte redo (försök $attempt/$max_attempts, url=$cand): health=$health_code auth=$auth_code"
            done

            if [[ "$pb_ready" == "true" ]]; then
              break
            fi

            if [[ "$matched_503" -eq "${#candidates[@]}" ]]; then
              consecutive_503=$((consecutive_503 + 1))
            else
              consecutive_503=0
            fi
            if [[ "$consecutive_503" -ge "$consecutive_503_limit" ]]; then
              echo "::warning::PocketBase ger ihållande 503 på alla URL-kandidater. Hoppar över PB-bootstrap i denna deploy."
              break
            fi

            sleep "$sleep_seconds"
          done

          if [[ "$pb_ready" != "true" ]]; then
            echo "::warning::PocketBase auth-endpoint blev inte redo i tid. Hoppar över PB-bootstrap/verify i denna deploy."
            echo "PB_READY=false" >> "$GITHUB_ENV"
            exit 0
          fi

          echo "PB_READY=true" >> "$GITHUB_ENV"
          echo "PB_URL_SELECTED=$selected_url" >> "$GITHUB_ENV"
          PB_URL="$selected_url" node backend/pocketbase-schema/scripts/setup-via-api.mjs

      - name: Verify PocketBase security baseline (production)
        if: env.PB_READY == 'true'
        env:
          PB_URL: ${{ env.PB_URL_SELECTED }}
          PB_SU_EMAIL: ${{ secrets.PB_SU_EMAIL_PRODUCTION || 'hampus@movexum.se' }}
          PB_SU_PASSWORD: ${{ secrets.PB_SU_PASSWORD_PRODUCTION }}
          APP_USER_EMAIL: ${{ secrets.APP_USER_EMAIL_PRODUCTION || 'hampus@movexum.se' }}
          APP_USER_PASSWORD: ${{ secrets.APP_USER_PASSWORD_PRODUCTION }}
          NODE_TLS_REJECT_UNAUTHORIZED: '0'
        run: node backend/pocketbase-schema/scripts/verify-baseline.mjs
