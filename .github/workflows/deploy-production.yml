name: Deploy to Coolify Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install

      - name: Build web app
        run: yarn build --workspace=@platform/web

      - name: Deploy to Coolify production
        env:
          COOLIFY_BASE_URL: ${{ secrets.COOLIFY_BASE_URL }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          COOLIFY_APP_UUID: ${{ secrets.COOLIFY_APP_UUID_PRODUCTION || secrets.COOLIFY_PROJECT_ID_PRODUCTION }}
          COOLIFY_DEPLOY_WEBHOOK: ${{ secrets.COOLIFY_DEPLOY_WEBHOOK_PRODUCTION }}
        run: |
          set -euo pipefail

          if [ -n "${COOLIFY_DEPLOY_WEBHOOK:-}" ]; then
            echo "Using Coolify deploy webhook"
            curl --fail-with-body -sS -X POST \
              -H "Authorization: Bearer $COOLIFY_TOKEN" \
              -H "Accept: application/json" \
              "$COOLIFY_DEPLOY_WEBHOOK"
            exit 0
          fi

          if [ -z "${COOLIFY_APP_UUID:-}" ]; then
            echo "Missing Coolify app UUID. Set COOLIFY_APP_UUID_PRODUCTION (or legacy COOLIFY_PROJECT_ID_PRODUCTION) in GitHub Secrets."
            exit 1
          fi

          deploy_v4="$COOLIFY_BASE_URL/api/v1/deploy?uuid=$COOLIFY_APP_UUID&force=false"
          deploy_v1="$COOLIFY_BASE_URL/api/v1/applications/$COOLIFY_APP_UUID/start?force=false"

          try_deploy() {
            local endpoint="$1"
            echo "Trying Coolify endpoint: $endpoint"

            local http_code
            http_code=$(curl -sS -X POST \
              -H "Authorization: Bearer $COOLIFY_TOKEN" \
              -H "Accept: application/json" \
              -o /tmp/coolify-response.json \
              -w "%{http_code}" \
              "$endpoint")

            if [ "$http_code" = "404" ]; then
              return 2
            fi

            if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
              cat /tmp/coolify-response.json
              return 0
            fi

            echo "Coolify deploy failed with HTTP $http_code"
            cat /tmp/coolify-response.json
            return 1
          }

          if try_deploy "$deploy_v4"; then
            exit 0
          elif [ $? -eq 2 ]; then
            echo "Endpoint not found, trying legacy path..."
          else
            exit 1
          fi

          if try_deploy "$deploy_v1"; then
            exit 0
          fi

          echo "Both Coolify deploy endpoints returned 404. Verify COOLIFY_BASE_URL and that COOLIFY_APP_UUID_PRODUCTION contains the Coolify app UUID."
          exit 1
