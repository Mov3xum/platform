name: Sync PocketBase schema

# Triggar när migrationer eller setup-scriptet ändras. Två steg:
#  1. Trigga Coolify-redeploy så hela compose-stacken (PB + web) byggs om.
#     Nya migrations i backend/pocketbase-schema/migrations/ blir
#     inbakade i PB-imagen och körs vid PB:s uppstart.
#  2. Kör setup-via-api.mjs som självläkande regel-sync — försäkrar att
#     createRules är synkroniserade även om migrations inte körde
#     (t.ex. om PB redan kände dem som körda).
#
# Lägg dessa secrets i repot:
#   PB_URL, PB_SU_EMAIL, PB_SU_PASSWORD — för API-sync
#   COOLIFY_BASE_URL, COOLIFY_TOKEN, COOLIFY_DEPLOY_WEBHOOK_STAGING
#     ELLER COOLIFY_APP_UUID_STAGING — för stack-redeploy

on:
  push:
    branches: [staging]
    paths:
      - 'backend/pocketbase-schema/**'
      - '.github/workflows/sync-pocketbase.yml'
  workflow_dispatch:

jobs:
  redeploy-stack:
    name: Trigger Coolify stack redeploy
    runs-on: ubuntu-latest
    steps:
      - name: Call Coolify deploy webhook
        env:
          COOLIFY_BASE_URL: ${{ secrets.COOLIFY_BASE_URL }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          COOLIFY_APP_UUID: ${{ secrets.COOLIFY_APP_UUID_STAGING || secrets.COOLIFY_PROJECT_ID_STAGING }}
          COOLIFY_DEPLOY_WEBHOOK: ${{ secrets.COOLIFY_DEPLOY_WEBHOOK_STAGING }}
        run: |
          set -euo pipefail

          if [ -n "${COOLIFY_DEPLOY_WEBHOOK:-}" ]; then
            echo "Trigging Coolify deploy webhook (stack redeploy)..."
            curl --fail-with-body -sS -X POST \
              -H "Authorization: Bearer $COOLIFY_TOKEN" \
              -H "Accept: application/json" \
              "$COOLIFY_DEPLOY_WEBHOOK"
            echo
            echo "✓ Coolify deploy triggered. PB-containern byggs om med nya migrations."
            exit 0
          fi

          if [ -z "${COOLIFY_APP_UUID:-}" ]; then
            echo "::warning::Ingen COOLIFY_DEPLOY_WEBHOOK_STAGING eller COOLIFY_APP_UUID_STAGING — hoppar över stack-redeploy."
            echo "Sätt en av dem som secret för att automatisera PB-migrations-deployment."
            exit 0
          fi

          encoded_identifier=$(node -e "process.stdout.write(encodeURIComponent(process.argv[1]))" "$COOLIFY_APP_UUID")
          curl --fail-with-body -sS -X POST \
            -H "Authorization: Bearer $COOLIFY_TOKEN" \
            -H "Accept: application/json" \
            "$COOLIFY_BASE_URL/api/v1/deploy?uuid=$encoded_identifier&force=true"
          echo
          echo "✓ Coolify deploy triggered via API."

  api-sync:
    name: Self-healing rule sync via API
    needs: redeploy-stack
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install pocketbase npm-paket
        run: yarn add pocketbase
        working-directory: backend/pocketbase-schema/scripts

      - name: Wait for PocketBase auth readiness
        id: pb_ready
        env:
          PB_URL: ${{ secrets.PB_URL }}
        run: |
          set -euo pipefail
          if [ -z "${PB_URL:-}" ]; then
            echo "::warning::PB_URL secret saknas. Skipping API sync."
            echo "ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          pb_url="${PB_URL%/}"
          if [[ "$pb_url" == http://* ]]; then
            pb_url="https://${pb_url#http://}"
          elif [[ "$pb_url" != https://* ]]; then
            pb_url="https://$pb_url"
          fi

          max_attempts=20
          sleep_seconds=15
          consecutive_503=0
          consecutive_503_limit=12

          for attempt in $(seq 1 "$max_attempts"); do
            health_code=$(curl -k -sS --connect-timeout 5 --max-time 10 -o /dev/null -w "%{http_code}" "$pb_url/api/health" || true)
            auth_code=$(curl -k -sS --connect-timeout 5 --max-time 10 -o /dev/null -w "%{http_code}" \
              -H "Content-Type: application/json" \
              -X POST \
              "$pb_url/api/collections/_superusers/auth-with-password" \
              --data '{"identity":"readiness-probe","password":"readiness-probe"}' || true)

            if [[ "$health_code" == "200" && "$auth_code" != "503" && "$auth_code" != "502" && "$auth_code" != "000" ]]; then
              echo "✓ PocketBase ready (health=$health_code, auth=$auth_code)"
              echo "ready=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            if [[ "$health_code" == "503" && "$auth_code" == "503" ]]; then
              consecutive_503=$((consecutive_503 + 1))
            else
              consecutive_503=0
            fi

            if [[ "$consecutive_503" -ge "$consecutive_503_limit" ]]; then
              echo "Persistent 503 from health/auth for $consecutive_503 consecutive attempts. Breaking early."
              break
            fi

            echo "PB not ready yet (attempt $attempt/$max_attempts): health=$health_code auth=$auth_code"
            sleep "$sleep_seconds"
          done

          echo "::warning::PocketBase auth endpoint not ready in time. Skipping API sync for this run."
          echo "ready=false" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Kör setup-via-api.mjs mot PocketBase
        if: steps.pb_ready.outputs.ready == 'true'
        env:
          PB_URL: ${{ secrets.PB_URL }}
          PB_SU_EMAIL: ${{ secrets.PB_SU_EMAIL }}
          PB_SU_PASSWORD: ${{ secrets.PB_SU_PASSWORD }}
          NODE_TLS_REJECT_UNAUTHORIZED: '0'
        run: node backend/pocketbase-schema/scripts/setup-via-api.mjs

      - name: Verifiera PocketBase baseline
        if: steps.pb_ready.outputs.ready == 'true'
        env:
          PB_URL: ${{ secrets.PB_URL }}
          PB_SU_EMAIL: ${{ secrets.PB_SU_EMAIL }}
          PB_SU_PASSWORD: ${{ secrets.PB_SU_PASSWORD }}
          APP_USER_EMAIL: ${{ secrets.APP_USER_EMAIL || secrets.PB_SU_EMAIL }}
          APP_USER_PASSWORD: ${{ secrets.APP_USER_PASSWORD }}
          NODE_TLS_REJECT_UNAUTHORIZED: '0'
        run: node backend/pocketbase-schema/scripts/verify-baseline.mjs
