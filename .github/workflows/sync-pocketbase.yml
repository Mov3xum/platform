name: Sync PocketBase schema

# Körs manuellt eller återanvänds från staging-deployen när en merge till
# staging innehåller PocketBase-påverkande filer. Två steg:
#  1. Trigga Coolify-redeploy så hela compose-stacken (PB + web) byggs om.
#     Nya migrations i backend/pocketbase-schema/migrations/ blir
#     inbakade i PB-imagen och körs vid PB:s uppstart.
#  2. Kör setup-via-api.mjs som självläkande regel-sync — försäkrar att
#     createRules är synkroniserade även om migrations inte körde
#     (t.ex. om PB redan kände dem som körda).
#
# Lägg dessa secrets i repot:
#   PB_URL_STAGING (fallback: PB_URL)
#   PB_SU_EMAIL_STAGING (fallback: PB_SU_EMAIL, default hampus@movexum.se)
#   PB_SU_PASSWORD_STAGING (fallback: PB_SU_PASSWORD) — för API-sync
#   COOLIFY_BASE_URL, COOLIFY_TOKEN, COOLIFY_DEPLOY_WEBHOOK_STAGING
#     ELLER COOLIFY_APP_UUID_STAGING — för stack-redeploy

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  redeploy-stack:
    name: Trigger Coolify stack redeploy
    runs-on: ubuntu-latest
    steps:
      - name: Call Coolify deploy webhook
        env:
          COOLIFY_BASE_URL: ${{ secrets.COOLIFY_BASE_URL }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          COOLIFY_APP_UUID: ${{ secrets.COOLIFY_APP_UUID_STAGING || secrets.COOLIFY_PROJECT_ID_STAGING }}
          COOLIFY_DEPLOY_WEBHOOK: ${{ secrets.COOLIFY_DEPLOY_WEBHOOK_STAGING }}
        run: |
          set -euo pipefail

          if [ -n "${COOLIFY_DEPLOY_WEBHOOK:-}" ]; then
            echo "Trigging Coolify deploy webhook (stack redeploy)..."
            curl --fail-with-body -sS -X POST \
              -H "Authorization: Bearer $COOLIFY_TOKEN" \
              -H "Accept: application/json" \
              "$COOLIFY_DEPLOY_WEBHOOK"
            echo
            echo "✓ Coolify deploy triggered. PB-containern byggs om med nya migrations."
            exit 0
          fi

          if [ -z "${COOLIFY_APP_UUID:-}" ]; then
            echo "::warning::Ingen COOLIFY_DEPLOY_WEBHOOK_STAGING eller COOLIFY_APP_UUID_STAGING — hoppar över stack-redeploy."
            echo "Sätt en av dem som secret för att automatisera PB-migrations-deployment."
            exit 0
          fi

          encoded_identifier=$(node -e "process.stdout.write(encodeURIComponent(process.argv[1]))" "$COOLIFY_APP_UUID")
          curl --fail-with-body -sS -X POST \
            -H "Authorization: Bearer $COOLIFY_TOKEN" \
            -H "Accept: application/json" \
            "$COOLIFY_BASE_URL/api/v1/deploy?uuid=$encoded_identifier&force=true"
          echo
          echo "✓ Coolify deploy triggered via API."

  api-sync:
    name: Self-healing rule sync via API
    needs: redeploy-stack
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install pocketbase npm-paket
        run: yarn add pocketbase
        working-directory: backend/pocketbase-schema/scripts

      - name: Wait for PocketBase auth readiness
        id: pb_ready
        env:
          PB_URL: ${{ secrets.PB_URL_STAGING || secrets.PB_URL }}
        run: |
          set -euo pipefail
          if [ -z "${PB_URL:-}" ]; then
            echo "::error::PB_URL_STAGING/PB_URL secret saknas. Sätt den i repo-secrets innan workflowen kan köra."
            exit 1
          fi

          strip_url() {
            local raw="${1%/}"
            raw="${raw#http://}"
            raw="${raw#https://}"
            printf '%s' "$raw"
          }

          seed_host=$(strip_url "$PB_URL")
          alt_host_1="${seed_host/nklch/nkich}"
          alt_host_2="${seed_host/nkich/nklch}"

          hosts=("$seed_host")
          if [[ "$alt_host_1" != "$seed_host" ]]; then
            hosts+=("$alt_host_1")
          fi
          if [[ "$alt_host_2" != "$seed_host" && "$alt_host_2" != "$alt_host_1" ]]; then
            hosts+=("$alt_host_2")
          fi

          candidates=()
          for host in "${hosts[@]}"; do
            candidates+=("http://$host")
            candidates+=("https://$host")
          done

          # Vi väntar upp till 8 försök × 8s = ~1 min. Coolify-redeployen
          # ovan kan rebooting:a PB, så ge den lite tid att komma upp.
          # Två persistent 503 i rad → bedöm som "PB är nere" och faila
          # hårt med actionable error så devops vet att rycka in.
          max_attempts=8
          sleep_seconds=8
          consecutive_503=0
          consecutive_503_limit=2

          for attempt in $(seq 1 "$max_attempts"); do
            matched_503=0
            for pb_url in "${candidates[@]}"; do
              health_code=$(curl -k -sS --connect-timeout 5 --max-time 10 -o /dev/null -w "%{http_code}" "$pb_url/api/health" || true)
              auth_code=$(curl -k -sS --connect-timeout 5 --max-time 10 -o /dev/null -w "%{http_code}" \
                -H "Content-Type: application/json" \
                -X POST \
                "$pb_url/api/collections/_superusers/auth-with-password" \
                --data '{"identity":"readiness-probe","password":"readiness-probe"}' || true)

              if [[ "$health_code" == "200" && "$auth_code" != "503" && "$auth_code" != "502" && "$auth_code" != "000" ]]; then
                echo "✓ PocketBase ready at $pb_url (health=$health_code, auth=$auth_code)"
                echo "selected_url=$pb_url" >> "$GITHUB_OUTPUT"
                exit 0
              fi

              if [[ "$health_code" == "503" && "$auth_code" == "503" ]]; then
                matched_503=$((matched_503 + 1))
              fi

              echo "PB not ready yet (attempt $attempt/$max_attempts, url=$pb_url): health=$health_code auth=$auth_code"
            done

            if [[ "$matched_503" -eq "${#candidates[@]}" ]]; then
              consecutive_503=$((consecutive_503 + 1))
            else
              consecutive_503=0
            fi

            if [[ "$consecutive_503" -ge "$consecutive_503_limit" ]]; then
              echo "::error::PocketBase returnerar persistent 503 på alla URL-kandidater (http/https + host-variationer)."
              echo "::error::Containern är troligen nere/hängd. SSH:a in på servern, kör 'docker ps' och starta om PB-containern."
              echo "::error::När PB är uppe igen — kör om denna workflow manuellt via 'Run workflow'-knappen."
              exit 1
            fi

            sleep "$sleep_seconds"
          done

          echo "::error::PocketBase auth-endpoint blev inte redo efter ${max_attempts} försök."
          echo "::error::Kolla PB-containerns hälsa på servern och kör om workflowen när den är uppe."
          exit 1

      - name: Kör setup-via-api.mjs mot PocketBase
        env:
          PB_URL: ${{ steps.pb_ready.outputs.selected_url }}
          PB_SU_EMAIL: ${{ secrets.PB_SU_EMAIL_STAGING || secrets.PB_SU_EMAIL }}
          PB_SU_PASSWORD: ${{ secrets.PB_SU_PASSWORD_STAGING || secrets.PB_SU_PASSWORD }}
          APP_USER_PASSWORD: ${{ secrets.APP_USER_PASSWORD_STAGING || secrets.APP_USER_PASSWORD }}
          NODE_TLS_REJECT_UNAUTHORIZED: '0'
        run: |
          set -euo pipefail

          if [ -z "${PB_SU_EMAIL:-}" ] || [ -z "${PB_SU_PASSWORD:-}" ]; then
            echo "::error::PB_SU_EMAIL_STAGING/PB_SU_EMAIL och PB_SU_PASSWORD_STAGING/PB_SU_PASSWORD måste vara satta."
            exit 1
          fi

          node backend/pocketbase-schema/scripts/setup-via-api.mjs

      - name: Verifiera PocketBase baseline
        env:
          PB_URL: ${{ steps.pb_ready.outputs.selected_url }}
          PB_SU_EMAIL: ${{ secrets.PB_SU_EMAIL_STAGING || secrets.PB_SU_EMAIL }}
          PB_SU_PASSWORD: ${{ secrets.PB_SU_PASSWORD_STAGING || secrets.PB_SU_PASSWORD }}
          APP_USER_EMAIL: ${{ secrets.APP_USER_EMAIL_STAGING || secrets.APP_USER_EMAIL }}
          APP_USER_PASSWORD: ${{ secrets.APP_USER_PASSWORD_STAGING || secrets.APP_USER_PASSWORD }}
          NODE_TLS_REJECT_UNAUTHORIZED: '0'
        run: |
          set -euo pipefail

          if [ -z "${PB_SU_EMAIL:-}" ] || [ -z "${PB_SU_PASSWORD:-}" ]; then
            echo "::error::PB_SU_EMAIL_STAGING/PB_SU_EMAIL och PB_SU_PASSWORD_STAGING/PB_SU_PASSWORD måste vara satta."
            exit 1
          fi

          app_user_email="${APP_USER_EMAIL:-$PB_SU_EMAIL}"
          if [ -z "${APP_USER_PASSWORD:-}" ]; then
            echo "::error::APP_USER_PASSWORD_STAGING/APP_USER_PASSWORD måste vara satt för verify-baseline."
            exit 1
          fi

          APP_USER_EMAIL="$app_user_email" node backend/pocketbase-schema/scripts/verify-baseline.mjs
