name: Sync PocketBase Direct (API)

on:
  workflow_dispatch:
  push:
    branches:
      - staging
    paths:
      - 'backend/pocketbase-schema/**'
      - '.github/workflows/pb-direct-sync.yml'

jobs:
  sync-verify:
    name: Sync and verify PocketBase directly
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install pocketbase npm package
        run: yarn add pocketbase
        working-directory: backend/pocketbase-schema/scripts

      - name: Wait for PocketBase readiness (with hostname fallback)
        id: pb_ready
        env:
          PB_URL_SECRET: ${{ secrets.PB_URL_STAGING || secrets.PB_URL }}
        run: |
          set -euo pipefail

          if [ -z "${PB_URL_SECRET:-}" ]; then
            echo "Missing PB_URL_STAGING/PB_URL secret"
            exit 1
          fi

          normalize_url() {
            local raw="$1"
            local normalized="${raw%/}"
            if [[ "$normalized" == http://* ]]; then
              normalized="https://${normalized#http://}"
            elif [[ "$normalized" != https://* ]]; then
              normalized="https://$normalized"
            fi
            printf '%s' "$normalized"
          }

          seed_url=$(normalize_url "$PB_URL_SECRET")
          alt_url_1="${seed_url/nklch/nkich}"
          alt_url_2="${seed_url/nkich/nklch}"

          candidates=("$seed_url")
          if [[ "$alt_url_1" != "$seed_url" ]]; then
            candidates+=("$alt_url_1")
          fi
          if [[ "$alt_url_2" != "$seed_url" && "$alt_url_2" != "$alt_url_1" ]]; then
            candidates+=("$alt_url_2")
          fi

          max_attempts=60
          sleep_seconds=8

          for attempt in $(seq 1 "$max_attempts"); do
            for pb_url in "${candidates[@]}"; do
              health_code=$(curl -k -sS --connect-timeout 5 --max-time 10 -o /dev/null -w "%{http_code}" "$pb_url/api/health" || true)
              auth_code=$(curl -k -sS --connect-timeout 5 --max-time 10 -o /dev/null -w "%{http_code}" \
                -H "Content-Type: application/json" \
                -X POST \
                "$pb_url/api/collections/_superusers/auth-with-password" \
                --data '{"identity":"readiness-probe","password":"readiness-probe"}' || true)

              echo "Attempt $attempt/$max_attempts url=$pb_url health=$health_code auth=$auth_code"

              if [[ "$health_code" == "200" && "$auth_code" != "503" && "$auth_code" != "502" && "$auth_code" != "000" ]]; then
                echo "PocketBase ready at $pb_url"
                echo "ready=true" >> "$GITHUB_OUTPUT"
                echo "selected_url=$pb_url" >> "$GITHUB_OUTPUT"
                exit 0
              fi
            done
            sleep "$sleep_seconds"
          done

          echo "PocketBase did not become ready in time for any candidate URL"
          echo "ready=false" >> "$GITHUB_OUTPUT"
          exit 1

      - name: Run setup-via-api
        if: steps.pb_ready.outputs.ready == 'true'
        env:
          PB_URL: ${{ steps.pb_ready.outputs.selected_url }}
          PB_SU_EMAIL: ${{ secrets.PB_SU_EMAIL_STAGING || secrets.PB_SU_EMAIL }}
          PB_SU_PASSWORD: ${{ secrets.PB_SU_PASSWORD_STAGING || secrets.PB_SU_PASSWORD }}
          APP_USER_PASSWORD: ${{ secrets.APP_USER_PASSWORD_STAGING || secrets.APP_USER_PASSWORD }}
          NODE_TLS_REJECT_UNAUTHORIZED: '0'
        run: |
          set -euo pipefail
          node backend/pocketbase-schema/scripts/setup-via-api.mjs

      - name: Verify baseline
        if: steps.pb_ready.outputs.ready == 'true'
        env:
          PB_URL: ${{ steps.pb_ready.outputs.selected_url }}
          PB_SU_EMAIL: ${{ secrets.PB_SU_EMAIL_STAGING || secrets.PB_SU_EMAIL }}
          PB_SU_PASSWORD: ${{ secrets.PB_SU_PASSWORD_STAGING || secrets.PB_SU_PASSWORD }}
          APP_USER_EMAIL: ${{ secrets.APP_USER_EMAIL || secrets.PB_SU_EMAIL }}
          APP_USER_PASSWORD: ${{ secrets.APP_USER_PASSWORD_STAGING || secrets.APP_USER_PASSWORD }}
          NODE_TLS_REJECT_UNAUTHORIZED: '0'
        run: |
          set -euo pipefail
          node backend/pocketbase-schema/scripts/verify-baseline.mjs
