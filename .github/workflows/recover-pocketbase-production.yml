name: Recover PocketBase via Coolify (production)

# Produktionsmotsvarighet till recover-pocketbase.yml. Körs manuellt när
# produktions-PB behöver tvingas om: redeploy av stacken → vänta in PB →
# self-healing rule sync → verifiera baseline.

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/recover-pocketbase-production.yml'

jobs:
  redeploy-stack:
    name: Trigger Coolify stack redeploy (production)
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify deploy
        env:
          COOLIFY_BASE_URL: ${{ secrets.COOLIFY_BASE_URL }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          COOLIFY_APP_UUID: ${{ secrets.COOLIFY_APP_UUID_PRODUCTION || secrets.COOLIFY_PROJECT_ID_PRODUCTION }}
          COOLIFY_DEPLOY_WEBHOOK: ${{ secrets.COOLIFY_DEPLOY_WEBHOOK_PRODUCTION }}
        run: |
          set -euo pipefail

          if [ -n "${COOLIFY_DEPLOY_WEBHOOK:-}" ]; then
            echo "Using Coolify deploy webhook"
            curl --fail-with-body -sS -X POST \
              -H "Authorization: Bearer $COOLIFY_TOKEN" \
              -H "Accept: application/json" \
              "$COOLIFY_DEPLOY_WEBHOOK"
            echo
            echo "Coolify deploy triggered via webhook"
            exit 0
          fi

          if [ -z "${COOLIFY_BASE_URL:-}" ] || [ -z "${COOLIFY_TOKEN:-}" ] || [ -z "${COOLIFY_APP_UUID:-}" ]; then
            echo "Missing Coolify secrets. Required: COOLIFY_BASE_URL, COOLIFY_TOKEN and either COOLIFY_DEPLOY_WEBHOOK_PRODUCTION or COOLIFY_APP_UUID_PRODUCTION/COOLIFY_PROJECT_ID_PRODUCTION"
            exit 1
          fi

          encoded_identifier=$(node -e "process.stdout.write(encodeURIComponent(process.argv[1]))" "$COOLIFY_APP_UUID")
          curl --fail-with-body -sS -X POST \
            -H "Authorization: Bearer $COOLIFY_TOKEN" \
            -H "Accept: application/json" \
            "$COOLIFY_BASE_URL/api/v1/deploy?uuid=$encoded_identifier&force=true"
          echo
          echo "Coolify deploy triggered via API"

  wait-sync-verify:
    name: Wait, sync and verify PocketBase (production)
    needs: redeploy-stack
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install pocketbase npm package
        run: yarn add pocketbase
        working-directory: backend/pocketbase-schema/scripts

      - name: Wait for PocketBase readiness
        id: pb_ready
        env:
          PB_URL: ${{ secrets.PB_URL_PRODUCTION }}
          PB_SU_EMAIL: ${{ secrets.PB_SU_EMAIL_PRODUCTION || 'hampus@movexum.se' }}
          PB_SU_PASSWORD: ${{ secrets.PB_SU_PASSWORD_PRODUCTION }}
        run: |
          set -euo pipefail

          if [ -z "${PB_URL:-}" ]; then
            echo "Missing PB_URL_PRODUCTION secret"
            exit 1
          fi

          if [ -z "${PB_SU_EMAIL:-}" ] || [ -z "${PB_SU_PASSWORD:-}" ]; then
            echo "Missing PB_SU_EMAIL_PRODUCTION or PB_SU_PASSWORD_PRODUCTION secret"
            exit 1
          fi

          strip_url() {
            local raw="${1%/}"
            raw="${raw#http://}"
            raw="${raw#https://}"
            printf '%s' "$raw"
          }

          host=$(strip_url "$PB_URL")
          candidates=("http://$host" "https://$host")

          max_attempts=60
          sleep_seconds=8

          for attempt in $(seq 1 "$max_attempts"); do
            for pb_url in "${candidates[@]}"; do
              health_code=$(curl -k -sS --connect-timeout 5 --max-time 10 -o /dev/null -w "%{http_code}" "$pb_url/api/health" || true)
              auth_code=$(curl -k -sS --connect-timeout 5 --max-time 10 -o /dev/null -w "%{http_code}" \
                -H "Content-Type: application/json" \
                -X POST \
                "$pb_url/api/collections/_superusers/auth-with-password" \
                --data '{"identity":"'"${PB_SU_EMAIL}"'","password":"'"${PB_SU_PASSWORD}"'"}' || true)

              echo "Attempt $attempt/$max_attempts url=$pb_url health=$health_code auth=$auth_code"

              if [[ "$health_code" == "200" && "$auth_code" != "503" && "$auth_code" != "502" && "$auth_code" != "000" ]]; then
                echo "PocketBase ready at $pb_url"
                echo "ready=true" >> "$GITHUB_OUTPUT"
                echo "selected_url=$pb_url" >> "$GITHUB_OUTPUT"
                exit 0
              fi
            done

            sleep "$sleep_seconds"
          done

          echo "PocketBase did not become ready in time for any candidate URL"
          echo "ready=false" >> "$GITHUB_OUTPUT"
          exit 1

      - name: Run setup-via-api
        if: steps.pb_ready.outputs.ready == 'true'
        env:
          PB_URL: ${{ steps.pb_ready.outputs.selected_url }}
          PB_SU_EMAIL: ${{ secrets.PB_SU_EMAIL_PRODUCTION || 'hampus@movexum.se' }}
          PB_SU_PASSWORD: ${{ secrets.PB_SU_PASSWORD_PRODUCTION }}
          APP_USER_PASSWORD: ${{ secrets.APP_USER_PASSWORD_PRODUCTION }}
          NODE_TLS_REJECT_UNAUTHORIZED: '0'
        run: |
          set -euo pipefail
          node backend/pocketbase-schema/scripts/setup-via-api.mjs

      - name: Verify baseline
        if: steps.pb_ready.outputs.ready == 'true'
        env:
          PB_URL: ${{ steps.pb_ready.outputs.selected_url }}
          PB_SU_EMAIL: ${{ secrets.PB_SU_EMAIL_PRODUCTION || 'hampus@movexum.se' }}
          PB_SU_PASSWORD: ${{ secrets.PB_SU_PASSWORD_PRODUCTION }}
          APP_USER_EMAIL: ${{ secrets.APP_USER_EMAIL_PRODUCTION || 'hampus@movexum.se' }}
          APP_USER_PASSWORD: ${{ secrets.APP_USER_PASSWORD_PRODUCTION }}
          NODE_TLS_REJECT_UNAUTHORIZED: '0'
        run: |
          set -euo pipefail
          node backend/pocketbase-schema/scripts/verify-baseline.mjs
