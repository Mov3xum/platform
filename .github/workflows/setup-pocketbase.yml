name: Setup PocketBase (one-shot bootstrap)

# Manuellt triggad workflow som bootstrap:ar en redan körande PB-instans:
# skapar alla 10 collections, Movexum-tenant och hampus@movexum.se app-user.
#
# Kör en gång efter att PB är uppe. Idempotent — säker att köra igen.
#
# Krav på repo-secrets:
#   PB_URL                — t.ex. https://pocketbase-r10nkich8dkune7s0flczb89.212.147.227.223.sslip.io
#   PB_SU_PASSWORD        — lösen till PB:s superuser hampus@movexum.se (det du satte i /_/-UI:t)
#   APP_USER_PASSWORD     — det lösen Hampus ska använda i Next.js-appens /login

on:
  workflow_dispatch:

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install deps
        run: yarn install --frozen-lockfile

      - name: Wait for PocketBase auth readiness
        env:
          PB_URL: ${{ secrets.PB_URL }}
        run: |
          set -euo pipefail

          if [ -z "${PB_URL:-}" ]; then
            echo "PB_URL saknas i secrets."
            exit 1
          fi

          pb_url="${PB_URL%/}"
          if [[ "$pb_url" == http://* ]]; then
            pb_url="https://${pb_url#http://}"
          elif [[ "$pb_url" != https://* ]]; then
            pb_url="https://$pb_url"
          fi

          for attempt in $(seq 1 40); do
            health_code=$(curl -k -sS -o /dev/null -w "%{http_code}" "$pb_url/api/health" || true)
            auth_code=$(curl -k -sS -o /dev/null -w "%{http_code}" \
              -H "Content-Type: application/json" \
              -X POST \
              "$pb_url/api/collections/_superusers/auth-with-password" \
              --data '{"identity":"readiness-probe","password":"readiness-probe"}' || true)

            if [[ "$health_code" == "200" && "$auth_code" != "503" && "$auth_code" != "502" && "$auth_code" != "000" ]]; then
              echo "PB online and auth endpoint ready (health=$health_code, auth=$auth_code)"
              exit 0
            fi

            echo "Attempt $attempt/40: health=$health_code auth=$auth_code, waiting 15s..."
            sleep 15
          done

          echo "PB auth endpoint was not ready after 10 minutes."
          exit 1

      - name: Bootstrap PocketBase
        env:
          PB_URL: ${{ secrets.PB_URL }}
          PB_SU_EMAIL: hampus@movexum.se
          PB_SU_PASSWORD: ${{ secrets.PB_SU_PASSWORD }}
          APP_USER_EMAIL: hampus@movexum.se
          APP_USER_PASSWORD: ${{ secrets.APP_USER_PASSWORD }}
          # PB:s sslip.io-domän har ofta self-signed cert. Detta skript är
          # ett engångs-bootstrap mot en server vi själva äger, så vi
          # tillåter osignerat cert för den här run:en.
          NODE_TLS_REJECT_UNAUTHORIZED: '0'
        run: node backend/pocketbase-schema/scripts/setup-via-api.mjs

      - name: Verify PocketBase baseline
        env:
          PB_URL: ${{ secrets.PB_URL }}
          PB_SU_EMAIL: hampus@movexum.se
          PB_SU_PASSWORD: ${{ secrets.PB_SU_PASSWORD }}
          APP_USER_EMAIL: hampus@movexum.se
          APP_USER_PASSWORD: ${{ secrets.APP_USER_PASSWORD }}
          NODE_TLS_REJECT_UNAUTHORIZED: '0'
        run: node backend/pocketbase-schema/scripts/verify-baseline.mjs

      - name: Summary
        if: success()
        run: |
          echo "## ✓ PocketBase bootstrappad" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Logga in på Next.js-appens \`/login\` med:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- E-post: \`hampus@movexum.se\`" >> $GITHUB_STEP_SUMMARY
          echo "- Lösen: värdet på \`APP_USER_PASSWORD\`-secret:en" >> $GITHUB_STEP_SUMMARY
