name: Recover PocketBase via Coolify

on:
  workflow_dispatch:
  push:
    branches:
      - staging
    paths:
      - '.github/workflows/recover-pocketbase.yml'

jobs:
  redeploy-stack:
    name: Trigger Coolify stack redeploy
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify deploy
        env:
          COOLIFY_BASE_URL: ${{ secrets.COOLIFY_BASE_URL }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          COOLIFY_APP_UUID: ${{ secrets.COOLIFY_APP_UUID_STAGING || secrets.COOLIFY_PROJECT_ID_STAGING }}
          COOLIFY_DEPLOY_WEBHOOK: ${{ secrets.COOLIFY_DEPLOY_WEBHOOK_STAGING }}
        run: |
          set -euo pipefail

          if [ -n "${COOLIFY_DEPLOY_WEBHOOK:-}" ]; then
            echo "Using Coolify deploy webhook"
            curl --fail-with-body -sS -X POST \
              -H "Authorization: Bearer $COOLIFY_TOKEN" \
              -H "Accept: application/json" \
              "$COOLIFY_DEPLOY_WEBHOOK"
            echo
            echo "Coolify deploy triggered via webhook"
            exit 0
          fi

          if [ -z "${COOLIFY_BASE_URL:-}" ] || [ -z "${COOLIFY_TOKEN:-}" ] || [ -z "${COOLIFY_APP_UUID:-}" ]; then
            echo "Missing Coolify secrets. Required: COOLIFY_BASE_URL, COOLIFY_TOKEN and either COOLIFY_DEPLOY_WEBHOOK_STAGING or COOLIFY_APP_UUID_STAGING/COOLIFY_PROJECT_ID_STAGING"
            exit 1
          fi

          encoded_identifier=$(node -e "process.stdout.write(encodeURIComponent(process.argv[1]))" "$COOLIFY_APP_UUID")
          curl --fail-with-body -sS -X POST \
            -H "Authorization: Bearer $COOLIFY_TOKEN" \
            -H "Accept: application/json" \
            "$COOLIFY_BASE_URL/api/v1/deploy?uuid=$encoded_identifier&force=true"
          echo
          echo "Coolify deploy triggered via API"

  wait-sync-verify:
    name: Wait, sync and verify PocketBase
    needs: redeploy-stack
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install pocketbase npm package
        run: yarn add pocketbase
        working-directory: backend/pocketbase-schema/scripts

      - name: Wait for PocketBase readiness
        id: pb_ready
        env:
          PB_URL: ${{ secrets.PB_URL_STAGING || secrets.PB_URL }}
        run: |
          set -euo pipefail

          if [ -z "${PB_URL:-}" ]; then
            echo "Missing PB_URL_STAGING/PB_URL secret"
            exit 1
          fi

          pb_url="${PB_URL%/}"
          if [[ "$pb_url" == http://* ]]; then
            pb_url="https://${pb_url#http://}"
          elif [[ "$pb_url" != https://* ]]; then
            pb_url="https://$pb_url"
          fi

          max_attempts=45
          sleep_seconds=10

          for attempt in $(seq 1 "$max_attempts"); do
            health_code=$(curl -k -sS --connect-timeout 5 --max-time 10 -o /dev/null -w "%{http_code}" "$pb_url/api/health" || true)
            auth_code=$(curl -k -sS --connect-timeout 5 --max-time 10 -o /dev/null -w "%{http_code}" \
              -H "Content-Type: application/json" \
              -X POST \
              "$pb_url/api/collections/_superusers/auth-with-password" \
              --data '{"identity":"readiness-probe","password":"readiness-probe"}' || true)

            if [[ "$health_code" == "200" && "$auth_code" != "503" && "$auth_code" != "502" && "$auth_code" != "000" ]]; then
              echo "PocketBase ready (health=$health_code, auth=$auth_code)"
              echo "ready=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            echo "Attempt $attempt/$max_attempts: health=$health_code auth=$auth_code (waiting ${sleep_seconds}s)"
            sleep "$sleep_seconds"
          done

          echo "PocketBase did not become ready in time"
          echo "ready=false" >> "$GITHUB_OUTPUT"
          exit 1

      - name: Run setup-via-api
        if: steps.pb_ready.outputs.ready == 'true'
        env:
          PB_URL: ${{ secrets.PB_URL_STAGING || secrets.PB_URL }}
          PB_SU_EMAIL: ${{ secrets.PB_SU_EMAIL_STAGING || secrets.PB_SU_EMAIL }}
          PB_SU_PASSWORD: ${{ secrets.PB_SU_PASSWORD_STAGING || secrets.PB_SU_PASSWORD }}
          APP_USER_PASSWORD: ${{ secrets.APP_USER_PASSWORD_STAGING || secrets.APP_USER_PASSWORD }}
          NODE_TLS_REJECT_UNAUTHORIZED: '0'
        run: |
          set -euo pipefail
          node backend/pocketbase-schema/scripts/setup-via-api.mjs

      - name: Verify baseline
        if: steps.pb_ready.outputs.ready == 'true'
        env:
          PB_URL: ${{ secrets.PB_URL_STAGING || secrets.PB_URL }}
          PB_SU_EMAIL: ${{ secrets.PB_SU_EMAIL_STAGING || secrets.PB_SU_EMAIL }}
          PB_SU_PASSWORD: ${{ secrets.PB_SU_PASSWORD_STAGING || secrets.PB_SU_PASSWORD }}
          APP_USER_EMAIL: ${{ secrets.APP_USER_EMAIL || secrets.PB_SU_EMAIL }}
          APP_USER_PASSWORD: ${{ secrets.APP_USER_PASSWORD_STAGING || secrets.APP_USER_PASSWORD }}
          NODE_TLS_REJECT_UNAUTHORIZED: '0'
        run: |
          set -euo pipefail
          node backend/pocketbase-schema/scripts/verify-baseline.mjs