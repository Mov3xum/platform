name: Deploy to Coolify Staging

on:
  push:
    branches:
      - staging
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install

      - name: Build web app
        run: yarn build --workspace=@platform/web

      - name: Install Coolify CLI
        run: npm install -g @coolify/cli

      - name: Deploy to Coolify staging
        env:
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          COOLIFY_PROJECT_ID: ${{ secrets.COOLIFY_PROJECT_ID_STAGING }}
        run: |
          coolify login --token "$COOLIFY_TOKEN"
          coolify deploy --project "$COOLIFY_PROJECT_ID" --env staging
