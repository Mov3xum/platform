name: Deploy to Coolify

on:
  push:
    branches:
      - staging
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Coolify CLI
        run: npm install -g @coolify/cli

      - name: Deploy staging to Coolify
        if: github.ref_name == 'staging'
        env:
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          COOLIFY_PROJECT_ID: ${{ secrets.COOLIFY_PROJECT_ID }}
        run: |
          coolify login --token "$COOLIFY_TOKEN"
          coolify deploy --project "$COOLIFY_PROJECT_ID" --env staging

      - name: Deploy production to Coolify
        if: github.ref_name == 'main'
        env:
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          COOLIFY_PROJECT_ID: ${{ secrets.COOLIFY_PROJECT_ID }}
        run: |
          coolify login --token "$COOLIFY_TOKEN"
          coolify deploy --project "$COOLIFY_PROJECT_ID" --env production
