name: Deploy to Coolify Staging

on:
  push:
    branches:
      - staging
  workflow_dispatch:

permissions:
  contents: read

jobs:
  detect-pocketbase-changes:
    runs-on: ubuntu-latest
    outputs:
      pocketbase_changed: ${{ steps.diff.outputs.pocketbase_changed }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect PocketBase-affecting changes
        id: diff
        run: |
          set -euo pipefail

          before_sha="${{ github.event.before }}"
          zero_sha="0000000000000000000000000000000000000000"

          if [ "${{ github.event_name }}" != "push" ] || [ -z "${before_sha:-}" ] || [ "$before_sha" = "$zero_sha" ]; then
            echo "Manual workflow_dispatch or missing before SHA; skipping automatic PocketBase sync."
            echo "pocketbase_changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files="$(git diff --name-only "$before_sha" "$GITHUB_SHA")"
          pb_change_pattern='^(backend/pocketbase-schema/|\.github/workflows/sync-pocketbase\.yml)'
          echo "Changed files since $before_sha:"
          echo "$changed_files"

          # Keep this pattern aligned with files that require a PocketBase stack
          # redeploy or schema sync after merges to staging.
          if printf '%s\n' "$changed_files" | grep -Eq "$pb_change_pattern"; then
            echo "PocketBase-affecting changes detected."
            echo "pocketbase_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No PocketBase-affecting changes detected."
            echo "pocketbase_changed=false" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: detect-pocketbase-changes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build web app
        run: yarn build

      - name: Typecheck
        run: yarn typecheck

      - name: Deploy to Coolify staging
        env:
          COOLIFY_BASE_URL: ${{ secrets.COOLIFY_BASE_URL }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          COOLIFY_APP_UUID: ${{ secrets.COOLIFY_APP_UUID_STAGING || secrets.COOLIFY_PROJECT_ID_STAGING }}
          COOLIFY_DEPLOY_WEBHOOK: ${{ secrets.COOLIFY_DEPLOY_WEBHOOK_STAGING }}
        run: |
          set -euo pipefail

          if [ -n "${COOLIFY_DEPLOY_WEBHOOK:-}" ]; then
            echo "Using Coolify deploy webhook"
            curl --fail-with-body -sS -X POST \
              -H "Authorization: Bearer $COOLIFY_TOKEN" \
              -H "Accept: application/json" \
              "$COOLIFY_DEPLOY_WEBHOOK"
            exit 0
          fi

          if [ -z "${COOLIFY_APP_UUID:-}" ]; then
            echo "Missing Coolify app UUID. Set COOLIFY_APP_UUID_STAGING (or legacy COOLIFY_PROJECT_ID_STAGING) in GitHub Secrets."
            exit 1
          fi

          encoded_identifier=$(node -e "process.stdout.write(encodeURIComponent(process.argv[1]))" "$COOLIFY_APP_UUID")
          deploy_param="uuid"
          if [[ "$COOLIFY_APP_UUID" == *:* ]]; then
            deploy_param="tag"
          fi

          deploy_v4="$COOLIFY_BASE_URL/api/v1/deploy?$deploy_param=$encoded_identifier&force=false"
          deploy_v1="$COOLIFY_BASE_URL/api/v1/applications/$COOLIFY_APP_UUID/start?force=false"

          try_deploy() {
            local endpoint="$1"
            echo "Trying Coolify endpoint: $endpoint"

            local http_code
            http_code=$(curl -sS -X POST \
              -H "Authorization: Bearer $COOLIFY_TOKEN" \
              -H "Accept: application/json" \
              -o /tmp/coolify-response.json \
              -w "%{http_code}" \
              "$endpoint")

            if [ "$http_code" = "404" ]; then
              return 2
            fi

            if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
              cat /tmp/coolify-response.json
              return 0
            fi

            echo "Coolify deploy failed with HTTP $http_code"
            cat /tmp/coolify-response.json
            return 1
          }

          if try_deploy "$deploy_v4"; then
            exit 0
          elif [ $? -eq 2 ]; then
            echo "Endpoint not found, trying legacy path..."
          else
            exit 1
          fi

          if try_deploy "$deploy_v1"; then
            exit 0
          fi

          echo "Both Coolify deploy endpoints returned 404. Verify COOLIFY_BASE_URL and that COOLIFY_APP_UUID_STAGING contains the Coolify app UUID."
          exit 1

      - name: Bootstrap PocketBase schema for staging
        env:
          PB_URL: ${{ secrets.PB_URL_STAGING || secrets.PB_URL }}
          PB_SU_EMAIL: ${{ secrets.PB_SU_EMAIL_STAGING || 'hampus@movexum.se' }}
          PB_SU_PASSWORD: ${{ secrets.PB_SU_PASSWORD_STAGING || secrets.PB_SU_PASSWORD }}
          APP_USER_PASSWORD: ${{ secrets.APP_USER_PASSWORD_STAGING || secrets.APP_USER_PASSWORD }}
          NODE_TLS_REJECT_UNAUTHORIZED: '0'
        run: |
          set -euo pipefail

          if [ -z "${PB_URL:-}" ] || [ -z "${PB_SU_PASSWORD:-}" ]; then
            echo "::warning::Missing PocketBase bootstrap secrets. Skipping PB bootstrap in this deploy run."
            echo "PB_READY=false" >> "$GITHUB_ENV"
            exit 0
          fi

          pb_url="${PB_URL%/}"
          if [[ "$pb_url" == http://* ]]; then
            pb_url="https://${pb_url#http://}"
          elif [[ "$pb_url" != https://* ]]; then
            pb_url="https://$pb_url"
          fi

          pb_ready=false
          max_attempts=8
          sleep_seconds=8
          consecutive_503=0
          consecutive_503_limit=2
          echo "Waiting for PocketBase auth endpoint readiness on $pb_url"
          for attempt in $(seq 1 "$max_attempts"); do
            health_code=$(curl -k -sS --connect-timeout 5 --max-time 10 -o /dev/null -w "%{http_code}" "$pb_url/api/health" || true)
            auth_code=$(curl -k -sS --connect-timeout 5 --max-time 10 -o /dev/null -w "%{http_code}" \
              -H "Content-Type: application/json" \
              -X POST \
              "$pb_url/api/collections/_superusers/auth-with-password" \
              --data '{"identity":"readiness-probe","password":"readiness-probe"}' || true)

            if [[ "$health_code" == "200" && "$auth_code" != "503" && "$auth_code" != "502" && "$auth_code" != "000" ]]; then
              echo "PocketBase ready (health=$health_code, auth=$auth_code)"
              pb_ready=true
              break
            fi

            if [[ "$health_code" == "503" && "$auth_code" == "503" ]]; then
              consecutive_503=$((consecutive_503 + 1))
            else
              consecutive_503=0
            fi

            if [[ "$consecutive_503" -ge "$consecutive_503_limit" ]]; then
              echo "Persistent 503 from health/auth for $consecutive_503 consecutive attempts. Breaking early and skipping PB bootstrap for this run."
              break
            fi

            echo "Attempt $attempt/$max_attempts: health=$health_code auth=$auth_code, waiting ${sleep_seconds}s..."
            sleep "$sleep_seconds"
          done

          if [[ "$pb_ready" != "true" ]]; then
            echo "::warning::PocketBase auth endpoint not ready in time. Skipping PB bootstrap/verify in this deploy run."
            echo "PB_READY=false" >> "$GITHUB_ENV"
            exit 0
          fi

          echo "PB_READY=true" >> "$GITHUB_ENV"
          node backend/pocketbase-schema/scripts/setup-via-api.mjs

      - name: Verify PocketBase security baseline
        if: env.PB_READY == 'true'
        env:
          PB_URL: ${{ secrets.PB_URL_STAGING || secrets.PB_URL }}
          PB_SU_EMAIL: ${{ secrets.PB_SU_EMAIL_STAGING || 'hampus@movexum.se' }}
          PB_SU_PASSWORD: ${{ secrets.PB_SU_PASSWORD_STAGING || secrets.PB_SU_PASSWORD }}
          APP_USER_EMAIL: hampus@movexum.se
          APP_USER_PASSWORD: ${{ secrets.APP_USER_PASSWORD_STAGING || secrets.APP_USER_PASSWORD }}
          NODE_TLS_REJECT_UNAUTHORIZED: '0'
        run: |
          set -euo pipefail
          node backend/pocketbase-schema/scripts/verify-baseline.mjs

  sync-pocketbase:
    name: Sync PocketBase schema after staging deploy
    needs:
      - detect-pocketbase-changes
      - deploy
    if: needs.detect-pocketbase-changes.outputs.pocketbase_changed == 'true'
    uses: ./.github/workflows/sync-pocketbase.yml
    secrets: inherit
